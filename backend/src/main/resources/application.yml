server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: lockin-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:55432}/${DB_NAME:lockin}
    username: ${DB_USERNAME:lockin}
    password: ${DB_PASSWORD:lockin}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${FRONTEND_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  security:
    jwt:
      secret: ${JWT_SECRET:lockin-dev-secret-key-lockin-dev-secret-key}
      expiration: ${JWT_EXPIRATION:PT8H}
      issuer: ${JWT_ISSUER:lockin-backend}
