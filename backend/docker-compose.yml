services:
  postgres:
    image: postgres:16
    container_name: lockin-postgres
    environment:
      POSTGRES_DB: lockin
      POSTGRES_USER: lockin
      POSTGRES_PASSWORD: lockin
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lockin -d lockin"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
