services:
  postgres:
    image: postgres:16
    container_name: lockin-postgres
    environment:
      POSTGRES_DB: lockin
      POSTGRES_USER: lockin
      POSTGRES_PASSWORD: lockin
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lockin -d lockin"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: lockin
      DB_USERNAME: lockin
      DB_PASSWORD: lockin
      FRONTEND_ORIGINS: http://localhost:4173
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "4173:80"

volumes:
  postgres-data:
